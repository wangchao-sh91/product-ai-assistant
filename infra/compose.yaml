services:
  web-ui:
    build:
      context: ../apps/web-ui
    environment:
      VITE_API_BASE_URL: http://localhost:${API_GATEWAY_PORT:-8000}
    ports:
      - "${WEB_UI_PORT:-3000}:3000"
    depends_on:
      - api-gateway

  api-gateway:
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      AI_ORCHESTRATOR_URL: ${AI_ORCHESTRATOR_URL:-http://ai-orchestrator:8001}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis
      - ai-orchestrator

  ai-orchestrator:
    build:
      context: ..
      dockerfile: apps/ai-orchestrator/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      QDRANT_URL: ${QDRANT_URL}
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4.1-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      RERANK_MODEL: ${RERANK_MODEL:-cross-encoder/mmarco-mMiniLMv2-L12-H384-v1}
      RERANK_ALLOW_DOWNLOAD: ${RERANK_ALLOW_DOWNLOAD:-0}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      HF_HOME: /models/huggingface
      HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
      HF_HUB_DISABLE_XET: "1"
    ports:
      - "${AI_ORCHESTRATOR_PORT:-8001}:8001"
    volumes:
      - huggingface-cache:/models/huggingface
    depends_on:
      - postgres
      - qdrant

  ingestion-worker:
    build:
      context: ..
      dockerfile: apps/ingestion-worker/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      QDRANT_URL: ${QDRANT_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      RERANK_MODEL: ${RERANK_MODEL:-cross-encoder/mmarco-mMiniLMv2-L12-H384-v1}
      RERANK_ALLOW_DOWNLOAD: ${RERANK_ALLOW_DOWNLOAD:-0}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      HF_HOME: /models/huggingface
      HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
      HF_HUB_DISABLE_XET: "1"
    volumes:
      - huggingface-cache:/models/huggingface
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_ops_copilot}
      POSTGRES_USER: ${POSTGRES_USER:-ai_ops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_ops_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_ops} -d ${POSTGRES_DB:-ai_ops_copilot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  minio-data:
  huggingface-cache:
